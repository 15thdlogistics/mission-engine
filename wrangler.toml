name = "mission-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Durable Object namespace for env.MISSION_STATE
[[durable_objects.bindings]]
name = "MISSION_STATE"
class_name = "MissionState"      # must match your DO class export

# If the Durable Object is in another worker script, also add:
# script_name = "mission-state-worker"

# Service binding for env["icc-pivot-engine"]
[[services]]
binding = "icc-pivot-engine"
service = "icc-pivot-engine"     # target Worker name
# environment = "production"     # optional

# Service binding for env["mission-comms"]
[[services]]
binding = "mission-comms"
service = "mission-comms"
# environment = "production"     # optional
